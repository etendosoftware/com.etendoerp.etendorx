image: maven:3.8.4  # Usa Maven como imagen base para el análisis de SonarQube

clone:
  depth: full

definitions:
  steps:
    # Revisión de código automatizada
    - step: &make-review
        name: Make Review Step
        script:
          - printenv
          - echo "-------------------------------------------------------------------------"
          - echo "${DOCKERHUB_PASSWORD}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
          - docker run -d -p 5000:5000 -e REPO_API_TOKEN="${ETENDOBOT_TOKEN}" -e PULL_REQUEST="${BITBUCKET_PR_ID}" -e PROJECT="${BITBUCKET_REPO_OWNER}" -e REPO_SLUG="${BITBUCKET_REPO_SLUG}" -e OPENAI_API_KEY="${OPENAI_API_KEY}" etendo/code-reviewer:"${REVIEWER_VERSION}"
          - echo "-------------------------------------------------------------------------"
          - sleep 10s
          - response=$(curl -s -o response.txt -w "%{http_code}" -X GET http://localhost:5000/review/bitbucket)
          - |
            if [ "$response" -ne 200 ]; then
              echo "API call failed with status code $response"
              cat response.txt
              exit 1
            fi
          - echo "API call successful with status code $response"
          - cat response.txt
        services:
          - docker

    # Análisis de SonarQube
    - step: &build-step
        name: SonarQube analysis
        script:
          - pipe: sonarsource/sonarqube-scan:1.0.0
            variables:
              SONAR_HOST_URL: ${SONAR_HOST_URL}
              SONAR_TOKEN: ${SONAR_TOKEN}
              SONAR_EXCLUDE: node_modules, android, ios

    # Construcción y despliegue de imágenes Docker multi-arquitectura
    - step: &build-push-images
        name: Build and Push Docker Images (amd64 and arm64)
        caches:
          - docker
        services:
          - docker
        script:
          # Configura QEMU para soportar múltiples arquitecturas sin necesidad de --privileged
          - docker run --rm --privileged aptman/qus -s -- -p  # QEMU user static sin --privileged
          - docker buildx create --use  # Crea un builder para multi-arquitectura
          - docker buildx inspect --bootstrap  # Verifica que el builder esté listo
          - export VERSION=$(cat VERSION)  
         
          # Construcción y publicación de imágenes para dynamic-gradle
          - echo "Building amd64 and arm64 images for dynamic-gradle"
          - docker buildx build --platform linux/amd64,linux/arm64 -t etendo/dynamic-gradle-lucas:${VERSION} . --push
          
          # Construcción y publicación de imágenes para dynamic-das
          - echo "Building amd64 and arm64 images for dynamic-das"
          - docker buildx build --platform linux/amd64,linux/arm64 -t etendo/dynamic-das:${VERSION} . --push

          # Crear y subir manifiesto multi-arquitectura para dynamic-gradle
          - echo "Creating and pushing manifest for multi-arch support for dynamic-gradle"
          - docker manifest create etendo/dynamic-gradle-lucas:${VERSION} \
              etendo/dynamic-gradle-lucas:${VERSION}-amd64 \
              etendo/dynamic-gradle-lucas:${VERSION}-arm64
          - docker manifest push etendo/dynamic-gradle-lucas:${VERSION}

          # Crear y subir manifiesto multi-arquitectura para dynamic-das
          - echo "Creating and pushing manifest for multi-arch support for dynamic-das"
          - docker manifest create etendo/dynamic-das:${VERSION} \
              etendo/dynamic-das:${VERSION}-amd64 \
              etendo/dynamic-das:${VERSION}-arm64
          - docker manifest push etendo/dynamic-das:${VERSION}

  caches:
    sonar: ~/.sonar

pipelines:
  branches:
    'feature/ERP-774':
      - step: *build-step
      - step: *build-push-images  
  pull-requests:
    'develop':
      - step:
          script:
            - echo "Skip for develop branch"
            - exit 0
    '**':
      - parallel:
          - step: *make-review
          - step: *build-step
