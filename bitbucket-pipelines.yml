image: docker:20.10.7  # Usa una imagen base de Docker estándar que incluya un shell

clone:
  depth: full

definitions:
  steps:
    - step: &make-review
        name: Make Review Step
        script:
          - printenv
          - echo "-------------------------------------------------------------------------"
          - echo "${DOCKERHUB_PASSWORD}" | docker login --username "${DOCKERHUB_USERNAME}" --password-stdin
          - docker run -d -p 5000:5000 -e REPO_API_TOKEN="${ETENDOBOT_TOKEN}" -e PULL_REQUEST="${BITBUCKET_PR_ID}" -e PROJECT="${BITBUCKET_REPO_OWNER}" -e REPO_SLUG="${BITBUCKET_REPO_SLUG}" -e OPENAI_API_KEY="${OPENAI_API_KEY}" etendo/code-reviewer:"${REVIEWER_VERSION}"
          - echo "-------------------------------------------------------------------------"
          - sleep 10s
          - response=$(curl -s -o response.txt -w "%{http_code}" -X GET http://localhost:5000/review/bitbucket)
          - |
            if [ "$response" -ne 200 ]; then
              echo "API call failed with status code $response"
              cat response.txt
              exit 1
            fi
          - echo "API call successful with status code $response"
          - cat response.txt
        services:
          - docker

    - step: &build-step
        name: SonarQube analysis
        script:
          - pipe: sonarsource/sonarqube-scan:1.0.0
            variables:
              SONAR_HOST_URL: ${SONAR_HOST_URL}
              SONAR_TOKEN: ${SONAR_TOKEN}
              SONAR_EXCLUDE: node_modules, android, ios

    - step: &build-push-images
        name: Build and Push Docker Images (amd64 and arm64)
        caches:
          - docker
        services:
          - docker
        script:
          - docker run --privileged --rm tonistiigi/binfmt --install all  # Habilita soporte para multi-arquitectura manualmente
          - docker buildx create --use  # Crea un builder para multi-arquitectura
          - docker buildx inspect --bootstrap  # Verifica que el builder esté listo para construir
          - export VERSION=$(cat VERSION)  
         
          # Build and push for dynamic-gradle with a custom name for testing
          - echo "Building amd64 and arm64 images for dynamic-gradle"
          - docker buildx build --platform linux/amd64,linux/arm64 -t test-lucas/dynamic-gradle:${VERSION} --push .
          
          # Build and push for dynamic-das with a custom name for testing
          - echo "Building amd64 and arm64 images for dynamic-das"
          - docker buildx build --platform linux/amd64,linux/arm64 -t test-lucas/dynamic-das:${VERSION} --push .

          # Create and push Docker manifest for dynamic-gradle
          - echo "Creating and pushing manifest for multi-arch support for dynamic-gradle"
          - docker manifest create test-lucas/dynamic-gradle:${VERSION} test-lucas/dynamic-gradle:${VERSION}-amd64 test-lucas/dynamic-gradle:${VERSION}-arm64
          - docker manifest push test-lucas/dynamic-gradle:${VERSION}

          # Create and push Docker manifest for dynamic-das
          - echo "Creating and pushing manifest for multi-arch support for dynamic-das"
          - docker manifest create test-lucas/dynamic-das:${VERSION} test-lucas/dynamic-das:${VERSION}-amd64 test-lucas/dynamic-das:${VERSION}-arm64
          - docker manifest push test-lucas/dynamic-das:${VERSION}

  caches:
    sonar: ~/.sonar

pipelines:
  branches:
    'feature/ERP-774':  
      - step: *build-step
      - step: *build-push-images  
  pull-requests:
    'develop':
      - step:
          script:
            - echo "Skip for develop branch"
            - exit 0
    '**':
      - parallel:
          - step: *make-review
          - step: *build-step
